<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css" media="screen">
    <title>Formulário</title>
</head>
<body>
    <div class="content">
        <h1>Formulário</h1>
        <form>
            <div>
                <input type="text" placeholder="Digite seu nome" class="inputs">
                <span class="span-required">Nome deve ter no mínimo três caracteres</span>
            </div>
             <div>
                <input type="email" placeholder="Digite seu melhor email" class="inputs">
                <span class="span-required">Digite um email válido</span>
            </div>
             <div>
                <input type="password" placeholder="Senha" class="inputs">
                <span class="span-required">Senha deve ter no mínimo oito caracteres</span>
            </div>
             <div>
                <input type="password" placeholder="Repita sua senha" class="inputs">
                <span class="span-required">Senhas devem ser compatíveis</span>
            </div>
            <div>
                <input type="date" placeholder="Data de nascimento" class="inputs">
                <span class="span-required">Deve ser maior de 18 anos</span>
            </div>
            <div>
                <input type="text" placeholder="Digite seu CPF" class="inputs">
                <span class="span-required">Digite um CPF válido</span>
            </div>
              <div>
                <input type="text" placeholder="Digite seu telefone" class="inputs">
                <span class="span-required">Número de telefone inválido</span>
            </div>
              <div>
                <input type="text" placeholder="Informe seu CEP" class="inputs">
                <span class="span-required">CEP inválido</span>
            </div>
            <p>Sexo:</p>
            <div class="box-select">
                <div>
                    <input type="radio" id="m" value="m" name="sexo">
                    <label for="Masculino">Masculino</label>
                </div>
                <div>
                    <input type="radio" id="f" value="Feminino" name="sexo">
                    <label for="Masculino">Feminino</label>
                </div>   
                <div>
                    <input type="radio" id="o" value="Outros" name="sexo">
                    <label for="Masculino">Outros</label>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
